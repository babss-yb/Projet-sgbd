services:
  # Backend Service
  - type: web
    name: transpobot-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production

  # Frontend Service (Static Site)
  - type: static
    name: transpobot-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: build # CRA outputs to 'build', not 'dist'
    envVars:
      - key: REACT_APP_API_URL
        value: https://votre-url-backend.onrender.com
