services:
  # Le Backend
  - type: web
    name: transpobot-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production

  # Le Frontend
  - type: static
    name: transpobot-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: build

# La Base de données
databases:
  - name: transpobot-db
    databaseName: transpobot
    plan: free
